<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GS Control CPA | Control OS</title>
    <meta
      name="description"
      content="Painel operacional privado com visual premium, dados locais e gestão completa de operadores, redes, metas, finanças e custos."
    />
    <meta name="theme-color" content="#0b0d12" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="assets/brand/gs-symbol.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.webmanifest?v=20260716-5" />
    <link rel="stylesheet" href="assets/css/styles.css?v=20260716-5" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__head">
          <button class="brand-button" data-action="go-home" aria-label="Ir para dashboard">
            <span class="brand-button__mark">
              <img src="assets/brand/gs-symbol.svg" alt="GS Control" class="brand-button__logo" />
            </span>
            <span class="brand-button__copy">
              <strong>GSCONTROL</strong>
              <small>CONTROL OS</small>
            </span>
          </button>
        </div>

        <nav class="nav-groups">
          <div class="nav-group">
            <p class="nav-group__label">Principal</p>
            <button class="nav-link is-active" data-section="dashboard" aria-label="Abrir Dashboard">
              <span class="nav-link__icon" data-icon="dashboard"></span>
              <span class="nav-link__text">Dashboard</span>
            </button>
            <button class="nav-link" data-section="meu-dia" aria-label="Abrir Meu Dia">
              <span class="nav-link__icon" data-icon="sun"></span>
              <span class="nav-link__text">Meu Dia</span>
            </button>
            <button class="nav-link" data-section="timeline" aria-label="Abrir Timeline">
              <span class="nav-link__icon" data-icon="activity"></span>
              <span class="nav-link__text">Timeline</span>
            </button>
            <button class="nav-link" data-section="favoritos" aria-label="Abrir Favoritos">
              <span class="nav-link__icon" data-icon="star"></span>
              <span class="nav-link__text">Favoritos</span>
            </button>
          </div>

          <div class="nav-group">
            <p class="nav-group__label">Operação</p>
            <button class="nav-link" data-section="operadores" aria-label="Abrir Operadores">
              <span class="nav-link__icon" data-icon="users"></span>
              <span class="nav-link__text">Operadores</span>
            </button>
            <button class="nav-link" data-section="gerentes" aria-label="Abrir Gerentes">
              <span class="nav-link__icon" data-icon="user-cog"></span>
              <span class="nav-link__text">Gerentes</span>
            </button>
            <button class="nav-link" data-section="redes" aria-label="Abrir Redes">
              <span class="nav-link__icon" data-icon="network"></span>
              <span class="nav-link__text">Redes</span>
            </button>
            <button class="nav-link" data-section="plataformas" aria-label="Abrir Plataformas">
              <span class="nav-link__icon" data-icon="layers"></span>
              <span class="nav-link__text">Plataformas</span>
            </button>
            <button class="nav-link" data-section="metas" aria-label="Abrir Metas">
              <span class="nav-link__icon" data-icon="target"></span>
              <span class="nav-link__text">Metas</span>
            </button>
          </div>

          <div class="nav-group">
            <p class="nav-group__label">Financeiro</p>
            <button class="nav-link" data-section="financeiro" aria-label="Abrir Financeiro">
              <span class="nav-link__icon" data-icon="banknote"></span>
              <span class="nav-link__text">Financeiro</span>
            </button>
            <button class="nav-link" data-section="custos" aria-label="Abrir Custos">
              <span class="nav-link__icon" data-icon="receipt"></span>
              <span class="nav-link__text">Custos</span>
            </button>
            <button class="nav-link" data-section="pix" aria-label="Abrir PIX">
              <span class="nav-link__icon" data-icon="wallet"></span>
              <span class="nav-link__text">PIX</span>
            </button>
            <button class="nav-link" data-section="remessas" aria-label="Abrir Remessas">
              <span class="nav-link__icon" data-icon="repeat"></span>
              <span class="nav-link__text">Remessas</span>
            </button>
          </div>

          <div class="nav-group">
            <p class="nav-group__label">Inteligência</p>
            <button class="nav-link" data-section="relatorios" aria-label="Abrir Relatórios">
              <span class="nav-link__icon" data-icon="chart"></span>
              <span class="nav-link__text">Relatórios</span>
            </button>
          </div>
        </nav>

        <div class="sidebar__foot">
          <div class="plan-card">
            <div class="plan-card__dot"></div>
            <div>
              <strong>Plano Enterprise</strong>
              <small>Ativo • renova em 24 dias</small>
            </div>
          </div>

          <div class="sidebar-tools">
            <button id="import-button" class="side-mini">Importar</button>
            <button id="export-button" class="side-mini">Exportar</button>
            <button id="reset-button" class="side-mini">Restaurar</button>
            <input id="import-input" type="file" accept=".json,application/json" hidden />
          </div>

          <button class="sidebar-collapse" data-action="toggle-sidebar">
            <span class="sidebar-collapse__icon" data-icon="chevrons-left"></span>
            <span class="sidebar-collapse__text">Recolher</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="searchbar">
            <span class="searchbar__icon" data-icon="search"></span>
            <input
              id="global-search"
              type="search"
              placeholder="Pesquisar operadores, redes, plataformas..."
              autocomplete="off"
            />
            <span class="searchbar__shortcut">⌘K</span>
          </div>

          <div class="topbar__actions">
            <button class="icon-chip" title="Rede global" aria-label="Rede global">
              <span data-icon="globe"></span>
            </button>
            <button class="icon-chip" title="Mensagens" aria-label="Mensagens">
              <span data-icon="message"></span>
            </button>
            <button class="icon-chip" title="Alertas" aria-label="Alertas">
              <span data-icon="bell"></span>
            </button>
            <button class="icon-chip" title="Alternar tema" aria-label="Alternar tema">
              <span data-icon="moon"></span>
            </button>

            <button class="profile-chip" data-action="refresh">
              <span class="profile-chip__mark">
                <img src="assets/brand/gs-symbol.svg" alt="GS Control" class="profile-chip__logo" />
              </span>
              <span class="profile-chip__copy">
                <strong id="profile-name">Daniel Bomfim</strong>
                <small id="profile-role">Admin • Enterprise</small>
              </span>
            </button>
          </div>
        </header>

        <section class="page-header">
          <div class="page-header__copy">
            <div class="breadcrumb" id="breadcrumb">Principal • Dashboard</div>
            <h1 id="page-title">Dashboard</h1>
            <p id="page-description">Como está sua operação agora.</p>
          </div>

          <div class="page-header__actions">
            <button class="range-chip" data-action="cycle-range">
              <span data-icon="calendar"></span>
              <span id="range-label">30 dias</span>
            </button>
            <div id="section-actions"></div>
          </div>
        </section>

        <section id="app-content" class="content"></section>
      </main>
    </div>

    <dialog id="cost-dialog" class="dialog">
      <form id="cost-form" class="dialog__panel" method="dialog">
        <div class="dialog__header">
          <div>
            <p class="dialog__eyebrow">Custos</p>
            <h2>Novo custo</h2>
          </div>
          <button type="button" class="dialog-close" data-close-dialog="cost-dialog">×</button>
        </div>

        <div class="form-grid">
          <label>
            Categoria <span class="required-mark">*</span>
            <select id="cost-type" required>
              <option value="Marketing">Marketing</option>
              <option value="Salários">Salários</option>
              <option value="Software">Software</option>
              <option value="Infra">Infra</option>
              <option value="Impostos">Impostos</option>
              <option value="Serviços">Serviços</option>
            </select>
          </label>

          <label>
            Fornecedor <span class="required-mark">*</span>
            <input id="cost-supplier" placeholder="Ex: Meta Ads" required />
          </label>

          <label>
            Valor <span class="required-mark">*</span>
            <div class="field-shell field-shell--money">
              <span class="field-prefix">R$</span>
              <input id="cost-value" type="text" inputmode="decimal" placeholder="1.500,00" required />
            </div>
          </label>

          <label>
            Data <span class="required-mark">*</span>
            <input id="cost-date" type="text" inputmode="numeric" placeholder="dd/mm/aaaa" required />
          </label>

          <label>
            Forma <span class="required-mark">*</span>
            <select id="cost-method" required>
              <option value="PIX">PIX</option>
              <option value="TED">TED</option>
              <option value="Boleto">Boleto</option>
              <option value="Cartão">Cartão</option>
            </select>
          </label>

          <label>
            Status <span class="required-mark">*</span>
            <select id="cost-status" required>
              <option value="pago">Pago</option>
              <option value="pendente">Pendente</option>
              <option value="vencido">Vencido</option>
            </select>
          </label>

          <label class="form-grid__full">
            Descrição
            <textarea id="cost-note" rows="4" placeholder="Descreva o custo"></textarea>
          </label>
        </div>

        <div class="dialog__footer">
          <button type="button" class="button button--ghost" data-close-dialog="cost-dialog">Cancelar</button>
          <button type="submit" class="button button--primary">Salvar custo</button>
        </div>
      </form>
    </dialog>

    <dialog id="remessa-dialog" class="dialog">
      <form id="remessa-form" class="dialog__panel" method="dialog">
        <div class="dialog__header">
          <div>
            <p class="dialog__eyebrow">Remessas</p>
            <h2>Nova operação</h2>
          </div>
          <button type="button" class="dialog-close" data-close-dialog="remessa-dialog">×</button>
        </div>

        <div class="form-grid">
          <label>
            ID <span class="required-mark">*</span>
            <input id="remessa-id" placeholder="Ex: REM-4824" required />
          </label>
          <label>
            Operador <span class="required-mark">*</span>
            <input id="remessa-operator" placeholder="Ex: Lucas Almeida" required />
          </label>
          <label>
            Rede <span class="required-mark">*</span>
            <input id="remessa-network" placeholder="Ex: Alpha Network" required />
          </label>
          <label>
            Plataforma <span class="required-mark">*</span>
            <input id="remessa-platform" placeholder="Ex: Fortuna Pro" required />
          </label>
          <label>
            Valor <span class="required-mark">*</span>
            <div class="field-shell field-shell--money">
              <span class="field-prefix">R$</span>
              <input id="remessa-value" type="text" inputmode="decimal" placeholder="12.500,00" required />
            </div>
          </label>
          <label>
            Status <span class="required-mark">*</span>
            <select id="remessa-status" required>
              <option value="concluida">Concluída</option>
              <option value="processando">Trabalhando</option>
              <option value="pendente">Pendente</option>
            </select>
          </label>
          <label>
            Origem <span class="required-mark">*</span>
            <input id="remessa-source" placeholder="Ex: Nubank" required />
          </label>
          <label>
            Destino <span class="required-mark">*</span>
            <input id="remessa-target" placeholder="Ex: Santander" required />
          </label>
          <label>
            Data <span class="required-mark">*</span>
            <input id="remessa-date" type="text" inputmode="numeric" placeholder="dd/mm/aaaa" required />
          </label>
          <label>
            ROI (%) <span class="required-mark">*</span>
            <input id="remessa-roi" type="number" step="0.1" placeholder="Ex: 118.7" required />
          </label>
          <label class="form-grid__full">
            Observação
            <textarea id="remessa-note" rows="4" placeholder="Anote algum detalhe importante"></textarea>
          </label>
        </div>

        <div class="dialog__footer">
          <button type="button" class="button button--ghost" data-close-dialog="remessa-dialog">Cancelar</button>
          <button type="submit" class="button button--primary">Salvar operação</button>
        </div>
      </form>
    </dialog>

    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

    <script src="assets/js/app.js?v=20260716-5" type="module"></script>
  </body>
</html>
