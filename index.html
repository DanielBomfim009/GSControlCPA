<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GS Control CPA | Control OS</title>
    <meta
      name="description"
      content="Painel operacional privado com visual premium, dados locais e gestao centralizada da operacao."
    />
    <meta name="theme-color" content="#0b0d12" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="assets/brand/gs-symbol.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.webmanifest?v=20260716-7" />
    <link rel="stylesheet" href="assets/css/styles.css?v=20260716-7" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__head">
          <button class="brand-button" data-action="go-home" aria-label="Ir para admin">
            <span class="brand-button__mark">
              <img src="assets/brand/gs-symbol.svg" alt="GS Control" class="brand-button__logo" />
            </span>
            <span class="brand-button__copy">
              <strong>GSCONTROL</strong>
              <small>CONTROL OS</small>
            </span>
          </button>
        </div>

        <nav class="nav-groups">
          <div class="nav-group">
            <p class="nav-group__label">Painel</p>
            <button class="nav-link is-active" data-section="admin" aria-label="Abrir Admin">
              <span class="nav-link__icon" data-icon="dashboard"></span>
              <span class="nav-link__text">Admin</span>
            </button>
          </div>
        </nav>

        <div class="sidebar__foot">
          <div class="plan-card">
            <div class="plan-card__dot"></div>
            <div>
              <strong>Operacao em tempo real</strong>
              <small id="sidebar-updated-at">Atualizado automaticamente</small>
            </div>
          </div>

          <div class="sidebar-tools">
            <button id="import-button" class="side-mini">Importar</button>
            <button id="export-button" class="side-mini">Exportar</button>
            <button id="reset-button" class="side-mini">Restaurar</button>
            <input id="import-input" type="file" accept=".json,application/json" hidden />
          </div>

          <button class="sidebar-collapse" data-action="toggle-sidebar">
            <span class="sidebar-collapse__icon" data-icon="chevrons-left"></span>
            <span class="sidebar-collapse__text">Recolher</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="searchbar">
            <span class="searchbar__icon" data-icon="search"></span>
            <input
              id="global-search"
              type="search"
              placeholder="Pesquisar metas, redes e operacoes..."
              autocomplete="off"
            />
            <span class="searchbar__shortcut">Ctrl K</span>
          </div>

          <div class="topbar__actions">
            <button class="icon-chip" title="Rede global" aria-label="Rede global">
              <span data-icon="globe"></span>
            </button>
            <button class="icon-chip" title="Mensagens" aria-label="Mensagens">
              <span data-icon="message"></span>
            </button>
            <button class="icon-chip" title="Alertas" aria-label="Alertas">
              <span data-icon="bell"></span>
            </button>
            <button class="icon-chip" title="Alternar tema" aria-label="Alternar tema">
              <span data-icon="moon"></span>
            </button>

            <button class="profile-chip" data-action="refresh">
              <span class="profile-chip__mark">
                <img src="assets/brand/gs-symbol.svg" alt="GS Control" class="profile-chip__logo" />
              </span>
              <span class="profile-chip__copy">
                <strong id="profile-name">Daniel Bomfim</strong>
                <small id="profile-role">Admin • Enterprise</small>
              </span>
            </button>
          </div>
        </header>

        <section class="page-header">
          <div class="page-header__copy">
            <div class="breadcrumb" id="breadcrumb">Admin • Visao geral</div>
            <h1 id="page-title">Admin</h1>
            <p id="page-description">Controle enxuto da operacao em tempo real.</p>
          </div>

          <div class="page-header__actions">
            <button class="range-chip" data-action="cycle-range">
              <span data-icon="calendar"></span>
              <span id="range-label">Mes</span>
            </button>
            <div id="section-actions"></div>
          </div>
        </section>

        <section id="app-content" class="content"></section>
      </main>
    </div>

    <dialog id="cost-dialog" class="dialog">
      <form id="cost-form" class="dialog__panel" method="dialog">
        <div class="dialog__header">
          <div>
            <p class="dialog__eyebrow">Custos</p>
            <h2>Novo custo</h2>
          </div>
          <button type="button" class="dialog-close" data-close-dialog="cost-dialog" aria-label="Fechar modal de custo">×</button>
        </div>

        <div class="form-grid">
          <label>
            Categoria <span class="required-mark">*</span>
            <select id="cost-type" required>
              <option value="Marketing">Marketing</option>
              <option value="Salarios">Salarios</option>
              <option value="Software">Software</option>
              <option value="Infra">Infra</option>
              <option value="Impostos">Impostos</option>
              <option value="Servicos">Servicos</option>
            </select>
          </label>

          <label>
            Fornecedor <span class="required-mark">*</span>
            <input id="cost-supplier" placeholder="Ex: Meta Ads" required />
          </label>

          <label>
            Valor <span class="required-mark">*</span>
            <div class="field-shell field-shell--money">
              <span class="field-prefix">R$</span>
              <input id="cost-value" type="text" inputmode="decimal" placeholder="1.500,00" required />
            </div>
          </label>

          <label>
            Data <span class="required-mark">*</span>
            <input id="cost-date" type="text" inputmode="numeric" placeholder="dd/mm/aaaa" required />
          </label>

          <label>
            Forma <span class="required-mark">*</span>
            <select id="cost-method" required>
              <option value="PIX">PIX</option>
              <option value="TED">TED</option>
              <option value="Boleto">Boleto</option>
              <option value="Cartao">Cartao</option>
            </select>
          </label>

          <label>
            Status <span class="required-mark">*</span>
            <select id="cost-status" required>
              <option value="pago">Pago</option>
              <option value="pendente">Pendente</option>
              <option value="vencido">Vencido</option>
            </select>
          </label>

          <label class="form-grid__full">
            Descricao
            <textarea id="cost-note" rows="4" placeholder="Descreva o custo"></textarea>
          </label>
        </div>

        <div class="dialog__footer">
          <button type="button" class="button button--ghost" data-close-dialog="cost-dialog">Cancelar</button>
          <button type="submit" class="button button--primary">Salvar custo</button>
        </div>
      </form>
    </dialog>

    <dialog id="remessa-dialog" class="dialog">
      <form id="remessa-form" class="dialog__panel" method="dialog">
        <div class="dialog__header">
          <div>
            <p class="dialog__eyebrow">Remessas</p>
            <h2>Nova operacao</h2>
          </div>
          <button type="button" class="dialog-close" data-close-dialog="remessa-dialog" aria-label="Fechar modal de operacao">×</button>
        </div>

        <div class="form-grid">
          <label>
            ID <span class="required-mark">*</span>
            <input id="remessa-id" placeholder="Ex: REM-4824" required />
          </label>
          <label>
            Operador <span class="required-mark">*</span>
            <input id="remessa-operator" placeholder="Ex: Lucas Almeida" required />
          </label>
          <label>
            Rede <span class="required-mark">*</span>
            <input id="remessa-network" placeholder="Ex: Alpha Network" required />
          </label>
          <label>
            Plataforma <span class="required-mark">*</span>
            <input id="remessa-platform" placeholder="Ex: Fortuna Pro" required />
          </label>
          <label>
            Valor <span class="required-mark">*</span>
            <div class="field-shell field-shell--money">
              <span class="field-prefix">R$</span>
              <input id="remessa-value" type="text" inputmode="decimal" placeholder="12.500,00" required />
            </div>
          </label>
          <label>
            Status <span class="required-mark">*</span>
            <select id="remessa-status" required>
              <option value="concluida">Concluida</option>
              <option value="processando">Trabalhando</option>
              <option value="pendente">Pendente</option>
            </select>
          </label>
          <label>
            Origem <span class="required-mark">*</span>
            <input id="remessa-source" placeholder="Ex: Nubank" required />
          </label>
          <label>
            Destino <span class="required-mark">*</span>
            <input id="remessa-target" placeholder="Ex: Santander" required />
          </label>
          <label>
            Data <span class="required-mark">*</span>
            <input id="remessa-date" type="text" inputmode="numeric" placeholder="dd/mm/aaaa" required />
          </label>
          <label>
            ROI (%) <span class="required-mark">*</span>
            <input id="remessa-roi" type="number" step="0.1" placeholder="Ex: 118.7" required />
          </label>
          <label class="form-grid__full">
            Observacao
            <textarea id="remessa-note" rows="4" placeholder="Anote algum detalhe importante"></textarea>
          </label>
        </div>

        <div class="dialog__footer">
          <button type="button" class="button button--ghost" data-close-dialog="remessa-dialog">Cancelar</button>
          <button type="submit" class="button button--primary">Salvar operacao</button>
        </div>
      </form>
    </dialog>

    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

    <script src="assets/js/admin-app.js?v=20260716-8" type="module"></script>
  </body>
</html>
